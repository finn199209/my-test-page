<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>测额工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- 页面 1 & 2: 测额工具输入界面 -->
        <div id="form-view" class="view active">
            <header class="header">
                <div class="back-btn">
                    <svg viewBox="0 0 1024 1024" width="24" height="24"><path d="M669.6 849.6c8.8 8.8 8.8 23.2 0 32s-23.2 8.8-32 0L297.6 541.6c-8.8-8.8-8.8-23.2 0-32l340-340c8.8-8.8 23.2-8.8 32 0s8.8 23.2 0 32L345.6 525.6l324 324z" fill="#333"></path></svg>
                </div>
                <h1 class="title">测额工具</h1>
                <div class="placeholder"></div>
            </header>

            <div class="tab-container">
                <div class="tabs">
                    <div class="tab active" data-type="enterprise">企业</div>
                    <div class="tab" data-type="personal">个人</div>
                    <div class="tab-slider"></div>
                </div>
            </div>

            <div class="form-content">
                <!-- 企业表单 -->
                <form id="enterprise-form" class="form active">
                    <div class="form-item">
                        <label class="label"><span class="required">*</span>公司名称：</label>
                        <input type="text" name="companyName" placeholder="请输入" class="input">
                    </div>
                    <div class="form-item">
                        <label class="label"><span class="required">*</span>国税账号：</label>
                        <input type="text" name="taxAccount" placeholder="请输入" class="input">
                    </div>
                    <div class="form-item">
                        <label class="label"><span class="required">*</span>预期额度：</label>
                        <div class="input-wrapper">
                            <input type="number" name="expectedAmount" placeholder="请输入" class="input">
                            <span class="unit">万元</span>
                        </div>
                    </div>
                    <div class="form-item">
                        <label class="label"><span class="required">*</span>上浮比例：</label>
                        <div class="input-wrapper">
                            <input type="number" name="markupRatio" value="20" class="input">
                            <span class="unit">%</span>
                        </div>
                    </div>
                    <div class="form-item">
                        <label class="label"><span class="required">*</span>审核利率：</label>
                        <div class="input-wrapper range-wrapper">
                            <input type="number" name="rateMin" placeholder="请输入" class="input mini">
                            <span class="unit">%</span>
                            <span class="separator">-</span>
                            <input type="number" name="rateMax" placeholder="请输入" class="input mini">
                            <span class="unit">%</span>
                        </div>
                    </div>
                    <div class="form-item">
                        <label class="label">申请日期：</label>
                        <input type="text" name="applyDate" placeholder="请选择日期" class="input date-input" onfocus="(this.type='date')" onblur="this.type='text'">
                    </div>
                    <div class="form-item">
                        <label class="label">审核日期：</label>
                        <input type="text" name="auditDate" placeholder="请选择日期" class="input date-input" onfocus="(this.type='date')" onblur="this.type='text'">
                    </div>
                </form>

                <!-- 个人表单 -->
                <form id="personal-form" class="form">
                    <div class="form-item">
                        <label class="label"><span class="required">*</span>申请人姓名：</label>
                        <input type="text" name="applicantName" placeholder="请输入" class="input">
                    </div>
                    <div class="form-item">
                        <label class="label"><span class="required">*</span>身份证号：</label>
                        <input type="text" name="idNumber" placeholder="请输入" class="input">
                    </div>
                    <div class="form-item">
                        <label class="label"><span class="required">*</span>手机号：</label>
                        <input type="tel" name="phoneNumber" placeholder="请输入" class="input">
                    </div>
                    <div class="form-item">
                        <label class="label"><span class="required">*</span>预期额度：</label>
                        <div class="input-wrapper">
                            <input type="number" name="expectedAmount" placeholder="请输入" class="input">
                            <span class="unit">万元</span>
                        </div>
                    </div>
                    <div class="form-item">
                        <label class="label"><span class="required">*</span>上浮比例：</label>
                        <div class="input-wrapper">
                            <input type="number" name="markupRatio" value="20" class="input">
                            <span class="unit">%</span>
                        </div>
                    </div>
                    <div class="form-item">
                        <label class="label"><span class="required">*</span>审核利率：</label>
                        <div class="input-wrapper range-wrapper">
                            <input type="number" name="rateMin" placeholder="请输入" class="input mini">
                            <span class="unit">%</span>
                            <span class="separator">-</span>
                            <input type="number" name="rateMax" placeholder="请输入" class="input mini">
                            <span class="unit">%</span>
                        </div>
                    </div>
                    <div class="form-item">
                        <label class="label">申请日期：</label>
                        <input type="text" name="applyDate" placeholder="请选择日期" class="input date-input" onfocus="(this.type='date')" onblur="this.type='text'">
                    </div>
                    <div class="form-item">
                        <label class="label">审核日期：</label>
                        <input type="text" name="auditDate" placeholder="请选择日期" class="input date-input" onfocus="(this.type='date')" onblur="this.type='text'">
                    </div>
                </form>
            </div>

            <footer class="footer">
                <button id="submit-btn" class="primary-btn">立即测额</button>
            </footer>
        </div>

        <!-- 页面 3: 审批通过界面 -->
        <div id="result-view" class="view result-bg">
            <header class="header transparent">
                <div class="back-btn white" id="result-back">
                    <svg viewBox="0 0 1024 1024" width="24" height="24"><path d="M669.6 849.6c8.8 8.8 8.8 23.2 0 32s-23.2 8.8-32 0L297.6 541.6c-8.8-8.8-8.8-23.2 0-32l340-340c8.8-8.8 23.2-8.8 32 0s8.8 23.2 0 32L345.6 525.6l324 324z" fill="#333"></path></svg>
                </div>
                <div class="placeholder"></div>
            </header>

            <div class="result-content">
                <div class="status-header">
                    <div class="status-icon">
                        <svg viewBox="0 0 100 100" width="32" height="32">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="#2E76EE" stroke-width="6"/>
                            <path d="M30 50 L45 65 L70 35" fill="none" stroke="#2E76EE" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <span class="status-text">审批通过</span>
                </div>

                <div class="card main-card">
                    <div class="card-title">授信金额 (元)</div>
                    <div class="amount" id="display-amount">1,000,000.00</div>
                    <div class="rate-tag">
                        审批利率: <span id="display-rate">3.75 % - 4.35 %</span>
                    </div>
                    <div class="time-info">
                        审批时间: <span id="display-audit-time">2024-03-28 11:00:41</span>
                    </div>
                    <div class="disclaimer">
                        上述金额为授信金额，实际金额将结合征信情况进行调整，以授信/借款合同为准
                    </div>
                    <button class="primary-btn action-btn">立即放款</button>
                </div>

                <div class="detail-list" id="result-details">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
